<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robodzidzo Data Portal</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 30px auto; padding: 20px; background-color: #f7f9fa; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; }
    input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { background-color: #C92A2A; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; font-size: 16px; }
    button:hover { background-color: #a61e1e; }
    #statusMessage { margin-top: 15px; font-weight: bold; }
  </style>
</head>
<body>

  <h2>Robodzidzo Evaluation & Telemetry Portal</h2>
  <form id="researchForm">
    <div class="form-group">
      <label for="name">Name / Participant ID:</label>
      <input type="text" id="name" name="name" required>
    </div>
    <div class="form-group">
      <label for="institution">Institution:</label>
      <select id="institution" name="institution" required>
        <option value="Mutare Teachers College">Mutare Teachers College</option>
        <option value="First Class Academy">First Class Academy</option>
        <option value="Other Seminar Site">Other Seminar Site</option>
      </select>
    </div>
    <div class="form-group">
      <label for="session">Session Type:</label>
      <select id="session" name="session" required>
        <option value="Physics Lecture">Physics Lecture</option>
        <option value="Physics Seminar">Physics Seminar</option>
        <option value="Robotics Workshop">Robotics Workshop</option>
        <option value="Research Supervision Consultation">Research Supervision Consultation</option>
      </select>
    </div>
    <div class="form-group">
      <label for="rating">Performance Rating / Self-Assessment Score (1-10):</label>
      <input type="number" id="rating" name="rating" min="1" max="10" required>
    </div>
    <div class="form-group">
      <label for="feedback">Observations / Technical Feedback:</label>
      <textarea id="feedback" name="feedback" rows="4" required></textarea>
    </div>
    <button type="submit">Submit Telemetry</button>
  </form>

  <div id="statusMessage"></div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwQX-YiqL7G6-nYYYD4ywQ_C6E16nKuBV7nSTOszjy33M-Kg-kJgbpgoRlv6E7fGkVc_g/exec"; // Replace with your Apps Script Web App URL

    document.getElementById('researchForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const statusDiv = document.getElementById('statusMessage');
      statusDiv.style.color = "orange";
      statusDiv.textContent = "Transmitting telemetry to central database...";

      const payload = {
        name: document.getElementById('name').value,
        institution: document.getElementById('institution').value,
        session: document.getElementById('session').value,
        rating: parseInt(document.getElementById('rating').value),
        feedback: document.getElementById('feedback').value
      };

      fetch(WEB_APP_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      })
      .then(res => res.text())
      .then(msg => {
        statusDiv.style.color = "green";
        statusDiv.textContent = "Data successfully synchronized! Tatenda / Siyabonga.";
        document.getElementById('researchForm').reset();
      })
      .catch(error => {
        statusDiv.style.color = "red";
        statusDiv.textContent = "Transmission failed. Check connectivity: " + error;
      });
    });
  </script>
</body>
</html>
